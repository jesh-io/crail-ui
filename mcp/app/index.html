<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crail Playground</title>
    <!-- Size to content, never viewport: no min-height on html/body/#root.
         The SDK's autoResize measures the document; pinning it to the
         viewport makes measurement circular. -->
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
